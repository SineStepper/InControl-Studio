<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InControl Studio — Novation SL MkIII</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <section id="view-studio" class="view active">
  <!-- ============================== MENU BAR ============================= -->
  <header class="menubar">
    <div class="mb-left">
      <div class="menu" id="menu-file">
        <button class="menu-btn" type="button">File</button>
        <div class="menu-pop">
          <button type="button" data-act="new">New setup</button>
          <label class="menu-item file">Import .syx<input type="file" id="studio-import" accept=".syx,application/octet-stream" hidden /></label>
          <label class="menu-item file">Load .json<input type="file" id="studio-load" accept="application/json,.json" hidden /></label>
          <button type="button" data-act="save">Save .json</button>
          <button type="button" data-act="export">Export .syx</button>
          <div class="menu-sep"></div>
          <label class="menu-item file">Import pack<input type="file" id="studio-pack-in" accept=".slmkiiipack,application/zip" hidden /></label>
          <label class="menu-item file">Import sessions<input type="file" id="studio-sessions-in" accept=".syx,application/octet-stream" hidden /></label>
        </div>
      </div>
      <div class="menu" id="menu-edit">
        <button class="menu-btn" type="button">Edit</button>
        <div class="menu-pop">
          <button type="button" data-act="undo">Undo</button>
          <button type="button" data-act="redo">Redo</button>
          <div class="menu-sep"></div>
          <button type="button" data-act="copy">Copy</button>
          <button type="button" data-act="cut">Cut</button>
          <button type="button" data-act="paste">Paste</button>
        </div>
      </div>
      <span class="brand-mini"><span class="dot"></span>InControl Studio</span>
    </div>

    <div class="mb-center" id="studio-chan-bar">
      <span class="fineprint">Per-channel instrument</span>
      <select id="chan-sel" title="Assign a control template to each MIDI channel / Part"></select>
      <button class="btn" id="chan-assign" title="Assign the current editor setup to this channel">Assign</button>
      <button class="btn" id="chan-clear" title="Remove this channel's assigned template">Clear</button>
      <span class="fineprint" id="chan-status"></span>
    </div>

    <div class="mb-right">
      <button class="btn primary" id="se-start">Start engine</button>
      <label class="se-lbl">Destination <select id="se-dest" title="A virtual / loopback port your DAW or synth listens to (IAC on macOS, loopMIDI on Windows). Your mapped MIDI and the sequencer's notes go here — NOT the SL."></select></label>
      <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
    </div>
  </header>

  <div class="status-bar">
    <span id="studio-status" class="status"></span>
    <span class="spacer"></span>
    <span id="se-log" class="fineprint"></span>
  </div>

  <!-- pack controls appear once a pack / sessions file is imported -->
  <div class="toolbar pack-bar" id="studio-pack-bar" style="display:none">
    <span class="fineprint" id="pack-name">Pack</span>
    <label class="se-lbl">Template <select id="pack-templates"></select></label>
    <button class="btn" id="pack-load">Load into editor</button>
    <label class="se-lbl" id="pack-sessions-lbl" style="display:none">Session <select id="pack-sessions-sel"></select></label>
    <button class="btn" id="pack-load-session" style="display:none">Load into sequencer</button>
    <span class="fineprint" id="pack-sessions"></span>
    <span class="spacer"></span>
    <button class="btn" id="pack-export-sessions">Export sessions .syx</button>
    <button class="btn" id="pack-export">Export pack</button>
  </div>

  <!-- ============================== SETTINGS ============================= -->
  <div id="settings-panel" class="settings-panel" hidden>
    <div class="settings-inner">
      <h2>Settings</h2>
      <div class="field"><label>Appearance</label>
        <button class="btn" id="theme-toggle">Switch to light</button></div>
      <hr />
      <p class="fineprint">MIDI ports auto-detect for the SL MkIII and the engine starts on launch.
        Override here only if needed.</p>
      <div class="field"><label title="SL MkIII InControl input — receives your control moves">SL in</label><select id="se-in"></select></div>
      <div class="field"><label title="SL MkIII InControl output — sends LED colors to the unit">SL out</label><select id="se-out"></select></div>
      <div class="field"><label title="SL MkIII keybed (regular port) — for sequencer live-record">Keys in</label><select id="se-keys"></select></div>
      <div class="field"><label>Name</label><input type="text" id="studio-name" maxlength="24" placeholder="Setup name" /></div>
      <hr />
      <div class="field"><label for="se-persist" title="Keep your templates, sessions and sequencer saved in this browser so they're here next time. Stored only on this device — nothing is uploaded.">Save my work in this browser</label>
        <input type="checkbox" id="se-persist" /></div>
      <p class="fineprint">Saved on this device only (not synced across browsers or computers). Use File ▸ Save to keep a portable copy.</p>
      <div class="field"><button class="btn" id="se-clear">Clear saved data</button></div>
      <div class="field"><button class="btn" id="settings-close">Close</button></div>
    </div>
  </div>

  <!-- ============ LIBRARY COLUMN (left) + TABS/VIEWS (right) ============ -->
  <!-- #77: the Templates / Sessions column sits BESIDE the tabs, not under them. -->
  <div class="app-cols">
    <aside id="library-col" class="library-col"></aside>
    <div class="app-main">
      <nav class="main-tabs" id="main-tabs">
        <button class="mtab active" type="button" data-view="editor">Editor</button>
        <button class="mtab" type="button" data-view="sequencer">Sequencer</button>
      </nav>

      <section id="view-editor" class="mview active">
        <nav id="editor-subtabs" class="editor-subtabs"></nav>
        <div id="editor-body" class="studio-body"></div>
      </section>

      <section id="view-sequencer" class="mview">
        <div id="sequencer-body" class="studio-body"></div>
      </section>
    </div>
  </div>
  </section>

  <script src="js/sysex.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/sltemplate.js"></script>
  <script src="js/pack.js"></script>
  <script src="js/session.js"></script>
  <script src="js/studio-sequencer.js"></script>
  <script src="js/studio-model.js"></script>
  <script src="js/studio-persist.js"></script>
  <script src="js/studio-engine.js"></script>
  <script src="js/studio-options.js"></script>
  <script src="js/incontrol.js"></script>
  <script src="js/midi.js"></script>
  <script src="js/studio-ui.js"></script>
  <script src="js/studio-sequencer-ui.js"></script>
  <script src="js/studio-runtime.js"></script>
</body>
</html>
