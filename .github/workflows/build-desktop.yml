name: Build desktop app

# Builds the Windows Electron installer.
#   - Run manually only (Actions tab -> "Build desktop app" -> "Run workflow").
#   - It does NOT run automatically on push or tag, so it consumes no Actions
#     minutes unless you explicitly start it.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Stage web assets
        run: node copy-assets.js

      - name: Build installer
        run: npx electron-builder --win --publish never
        env:
          # Build unsigned (no certificates in CI); users self-approve on first launch.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        if: always() # the .exe is produced before any post-build step, so capture it regardless
        uses: actions/upload-artifact@v4
        with:
          name: slmkiii-customizer-windows
          if-no-files-found: error
          path: desktop/dist/*.exe

      - name: Publish to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.exe
