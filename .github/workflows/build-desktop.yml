name: Build desktop app

# Builds the Windows Electron installer.
#   - Automatically on every push to a branch (installer as a run artifact).
#   - Run manually anytime (Actions tab -> "Build desktop app" -> "Run workflow").
#   - Push a version tag (e.g. v1.0.0) to also publish it to a GitHub Release.
on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
    # Skip doc-only pushes; add paths here if you want to narrow further.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'assets/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Stage web assets
        run: node copy-assets.js

      - name: Build installer
        run: npx electron-builder --win --publish never
        env:
          # Build unsigned (no certificates in CI); users self-approve on first launch.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        if: always() # the .exe is produced before any post-build step, so capture it regardless
        uses: actions/upload-artifact@v4
        with:
          name: slmkiii-customizer-windows
          if-no-files-found: error
          path: desktop/dist/*.exe

      - name: Publish to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.exe
